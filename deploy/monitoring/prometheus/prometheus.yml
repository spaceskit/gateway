global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: spaceskit-gateway
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: prometheus-observer
    static_configs:
      - targets:
          - gateway:9320
          - gateway-peer:9420
