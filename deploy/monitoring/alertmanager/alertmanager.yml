global:
  resolve_timeout: 5m

route:
  group_by: [alertname, service, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: spaceskit-ops-webhook
  routes:
    - matchers:
        - severity="critical"
      receiver: spaceskit-ops-webhook

receivers:
  - name: spaceskit-ops-webhook
    webhook_configs:
      - url: http://alert-webhook:8080/
        send_resolved: true
